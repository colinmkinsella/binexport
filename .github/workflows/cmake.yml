name: cmake-build

on: [push, pull_request]

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
        - os: ubuntu-22.04
        - os: macos-12
        - os: windows-2022
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Install ninja-build tool
      uses: turtlesec-no/get-ninja@1.1.0

    - name: Create Build Environment
      working-directory: ${{ github.workspace }}
      shell: bash
      run: |
        mkdir -p "${{ runner.workspace }}/build"

    - name: Enable Developer Command Prompt (Windows)
      if: matrix.os == 'windows-2022'
      uses: MarkusJx/install-boost@v2
      with:
        boost_version: 1.83.0
        platform_version: 2022
        boost_install_dir: ${{github.workspace}}/boost
        toolset: msvc

    - name: Enable mold linker (Linux)
      if: matrix.os == 'ubuntu-22.04'
      uses: rui314/setup-mold@v1

    - name: Configure CMake
      working-directory: ${{ runner.workspace }}/build
      shell: bash
      run: |
        cmake "${{ github.workspace }}" -G Ninja \
          "-DCMAKE_BUILD_TYPE=${BUILD_TYPE}" \
          "-DBINEXPORT_ENABLE_IDAPRO=OFF" \
          "-DBINEXPORT_ENABLE_BINARYNINJA=ON" \
          "-DBINEXPORT_BINARYNINJA_CHANNEL=stable" \
          "-DBINEXPORT_BINARYNINJA_LATEST=ON" \
          "-DBOOST_ROOT=${{github.workspace}}/boost"
          "-DBoost_INCLUDE_DIR=${{github.workspace}}/boost/include" \
          "-DBoost_LIBRARY_DIRS=${{github.workspace}}/boost/lib"
      env:
        BOOST_ROOT: ${{ steps.install-boost.outputs.BOOST_ROOT }}

    - name: Build
      working-directory: ${{ runner.workspace }}/build
      shell: bash
      run: cmake --build . --config "${BUILD_TYPE}"

    - name: Test
      working-directory: ${{ runner.workspace }}/build
      shell: bash
      run: ctest --build-config "${BUILD_TYPE}" --output-on-failure -R '^[A-Z]'

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: BinExport-${{ runner.os }}
        path: |
          ${{ runner.workspace }}/build/binaryninja/binexport*
          ${{ runner.workspace }}/build/tools/binexport2dump*
